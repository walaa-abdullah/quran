<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القرآن الكريم</title>
    <!-- Beautiful Arabic Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Light Mode Variables (Default) */
        :root {
            --bg: #f8f9fa;
            --paper: #ffffff;
            --text: #2d3436;
            --accent: #d35400;
            --header-bg: #1e3a5f;
            --header-text: #ffffff;
            --primary-text: #1e3a5f;
            --border-color: #1e3a5f;
            --sadaqah-bg: #f1f6f9;
            --sadaqah-dua: #636e72;
        }

        /* Dark Mode Variables */
        [data-theme="dark"] {
            --bg: #121212;
            --paper: #1e1e1e;
            --text: #e8eaed;
            --accent: #ffb142; /* Lighter orange for dark screens */
            --header-bg: #2d2d2d;
            --header-text: #ffffff;
            --primary-text: #90caf9; /* Lighter blue for dark screens */
            --border-color: #555555;
            --sadaqah-bg: #2a2a2a;
            --sadaqah-dua: #aaaaaa;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        header {
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease;
        }
        
        .header-spacer {
            width: 40px; /* Balances the layout so title stays centered */
        }

        .header-title {
            font-size: 30px;
            font-weight: 700;
            flex-grow: 1;
            text-align: center;
            margin: 0;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--header-text);
            padding: 5px;
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .controls {
            margin-bottom: 30px;
            text-align: center;
        }
        
        select {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            font-size: 18px;
            font-family: 'Cairo', sans-serif;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--paper);
            color: var(--text);
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
        }
        
        select:focus {
            box-shadow: 0 0 8px rgba(144, 202, 249, 0.5);
        }
        
        #quran-container {
            background: var(--paper);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            min-height: 400px;
            transition: background-color 0.3s ease;
        }
        
        /* ---- STYLES FOR SADAQAH MESSAGE ---- */
        .sadaqah-box {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 30px;
            background-color: var(--sadaqah-bg);
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .sadaqah-title {
            font-family: 'Amiri Quran', serif;
            font-size: 32px;
            color: var(--primary-text);
            margin-bottom: 10px;
            line-height: 1.5;
            transition: color 0.3s ease;
        }
        
        .sadaqah-dua {
            font-size: 18px;
            color: var(--sadaqah-dua);
            transition: color 0.3s ease;
        }
        /* ------------------------------------ */

        .surah-title {
            text-align: center;
            font-family: 'Amiri Quran', serif;
            font-size: 40px;
            color: var(--primary-text);
            margin-bottom: 20px;
            transition: color 0.3s ease;
        }
        
        .bismillah {
            text-align: center;
            font-family: 'Amiri Quran', serif;
            font-size: 30px;
            color: var(--text);
            margin-bottom: 30px;
        }
        
        .quran-text {
            font-family: 'Amiri Quran', serif;
            font-size: 34px;
            line-height: 2.5;
            text-align: justify;
            text-align-last: center;
        }
        
        .ayah-number {
            color: var(--accent);
            font-size: 26px;
            margin: 0 8px;
            transition: color 0.3s ease;
        }
        
        .loading {
            text-align: center;
            color: var(--sadaqah-dua);
            font-size: 22px;
            margin-top: 20px;
        }
        
        /* Mobile Screen Adjustments */
        @media (max-width: 600px) {
            .quran-text {
                font-size: 26px;
                line-height: 2.2;
            }
            #quran-container {
                padding: 20px;
            }
            .surah-title {
                font-size: 32px;
            }
            .bismillah {
                font-size: 24px;
            }
            .sadaqah-title {
                font-size: 26px;
            }
            .header-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-spacer"></div>
        <h1 class="header-title">القرآن الكريم</h1>
        <button id="theme-toggle" class="theme-toggle" aria-label="تبديل الوضع">🌙</button>
    </header>

    <div class="container">
        <div class="controls">
            <select id="surah-select">
                <option value="">اختر السورة لبدء القراءة...</option>
            </select>
        </div>

        <div id="quran-container">
            <!-- SADAQAH MESSAGE HERE -->
            <div class="sadaqah-box">
                <div class="sadaqah-title">صدقة جارية لأمي ولاء عبدالله</div>
                <div class="sadaqah-dua">نسألكم الدعاء لها بالصحة والعافية وقبول الأعمال</div>
            </div>
            <div class="loading">الرجاء اختيار السورة من القائمة أعلاه ☝️</div>
        </div>
    </div>

    <script>
        // --- Dark Mode Logic ---
        const themeToggle = document.getElementById('theme-toggle');
        
        // Check if the user previously chose dark mode
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeToggle.textContent = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeToggle.textContent = '☀️';
            }
        });
        // -----------------------

        // Convert numbers to Arabic numerals
        function toArabicNumbers(num) {
            const arabicNumbers =['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
            return String(num).split('').map(c => arabicNumbers[c]).join('');
        }

        // Fetch the list of Surahs when the page loads
        fetch('https://api.alquran.cloud/v1/surah')
            .then(response => response.json())
            .then(data => {
                const select = document.getElementById('surah-select');
                data.data.forEach(surah => {
                    const option = document.createElement('option');
                    option.value = surah.number;
                    option.textContent = toArabicNumbers(surah.number) + " - " + surah.name;
                    select.appendChild(option);
                });
            })
            .catch(error => console.error('Error loading surahs:', error));

        // Fetch and display Surah when selected
        document.getElementById('surah-select').addEventListener('change', function() {
            const surahNumber = this.value;
            
            // If they click back to the empty option, show the Sadaqah message again
            if (!surahNumber) {
                document.getElementById('quran-container').innerHTML = `
                    <div class="sadaqah-box">
                        <div class="sadaqah-title">صدقة جارية لأمي ولاء عبدالله</div>
                        <div class="sadaqah-dua">نسألكم الدعاء لها بالصحة والعافية وقبول الأعمال</div>
                    </div>
                    <div class="loading">الرجاء اختيار السورة من القائمة أعلاه ☝️</div>
                `;
                return;
            }

            const container = document.getElementById('quran-container');
            container.innerHTML = '<div class="loading">جاري تحميل السورة... ⏳</div>';

            // Fetch Uthmani script
            fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}/quran-uthmani`)
                .then(response => response.json())
                .then(data => {
                    const surahName = data.data.name;
                    let html = `<div class="surah-title">${surahName}</div>`;
                    
                    // Add Bismillah for all Surahs except Fatihah (1) and Tawbah (9)
                    if (surahNumber != 1 && surahNumber != 9) {
                        html += `<div class="bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div>`;
                    }

                    html += '<div class="quran-text">';
                    
                    data.data.ayahs.forEach(ayah => {
                        let text = ayah.text;
                        // Prevent duplicate Bismillah in Ayah 1 
                        if (surahNumber != 1 && ayah.numberInSurah == 1) {
                            text = text.replace('بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ ', '');
                        }
                        html += `${text} <span class="ayah-number">﴿${toArabicNumbers(ayah.numberInSurah)}﴾</span> `;
                    });
                    
                    html += '</div>';
                    container.innerHTML = html;
                })
                .catch(error => {
                    container.innerHTML = '<div class="loading" style="color: red;">حدث خطأ أثناء التحميل. تأكد من اتصالك بالإنترنت.</div>';
                });
        });
    </script>
</body>
</html>
